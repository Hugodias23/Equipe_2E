<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-label="Affiche OmnesEvent">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#22d3ee"  stop-opacity=".1"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond sombre -->
  <rect width="900" height="600" fill="#07090f"/>

  <!-- Orbe arrière-plan -->
  <ellipse cx="700" cy="160" rx="220" ry="220" fill="url(#orb)"/>
  <ellipse cx="140" cy="440" rx="180" ry="180" fill="url(#orb)"/>

  <!-- Grille de points décorative -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.2" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="900" height="600" fill="url(#dots)"/>

  <!-- Vague gradient en bas -->
  <path d="M0 420 C180 330 320 510 520 380 C670 285 760 320 900 235 L900 600 L0 600 Z" fill="url(#wave)" opacity=".22"/>
  <path d="M0 460 C200 370 360 540 560 410 C710 320 800 355 900 280 L900 600 L0 600 Z" fill="url(#glow)"/>

  <!-- Eclair décoratif -->
  <polygon points="685,62 638,148 672,148 652,220 720,130 685,130" fill="white" opacity=".18"/>

  <!-- Texte -->
  <text x="70" y="140" fill="#fff" font-size="72" font-family="Inter,Segoe UI,Arial" font-weight="800" letter-spacing="-2">OmnesEvent</text>
  <text x="74" y="206" fill="#a78bfa" font-size="32" font-family="Inter,Segoe UI,Arial" font-weight="500">Campus · Billets · Associations</text>
</svg>
